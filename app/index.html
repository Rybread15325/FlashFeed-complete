<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashFeed</title>
    <!-- Google Translate: hidden widget used for full-page translation -->
    <style>#google_translate_element{display:none!important;visibility:hidden!important;}.goog-te-banner-frame{display:none!important;}.goog-te-gadget{display:none!important;}body{top:0!important;}</style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="text/javascript">
      window.googleTranslateElementInit = function() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false,
          multilanguagePage: false
        }, 'google_translate_element');
      };
      window.flashfeedTranslateTo = function(langCode) {
        if (!langCode || langCode === 'en') {
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + window.location.hostname;
          var combo = document.querySelector('.goog-te-combo');
          if (combo) { combo.value = ''; combo.dispatchEvent(new Event('change')); }
          else { window.location.reload(); }
          return;
        }
        var map = { zh: 'zh-CN', bn: 'bn' };
        var gl = map[langCode] || langCode;
        document.cookie = 'googtrans=/en/' + gl + '; path=/';
        document.cookie = 'googtrans=/en/' + gl + '; path=/; domain=' + window.location.hostname;
        var combo = document.querySelector('.goog-te-combo');
        if (combo) { combo.value = gl; combo.dispatchEvent(new Event('change')); }
        else { window.location.reload(); }
      };
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </body>
</html>
