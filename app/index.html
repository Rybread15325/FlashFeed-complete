<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashFeed</title>
    <style>
      /* Move GT element off-screen so widget initialises but shows no UI */
      #google_translate_element {
        position: absolute;
        left: -9999px;
        top: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      /* Suppress the "Translated to …" header banner Google injects */
      .goog-te-banner-frame { display: none !important; }
      /* Google sets body{top:-40px} when the banner exists — reset it */
      body { top: 0 !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="text/javascript">
      window.googleTranslateElementInit = function() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false,
          multilanguagePage: false
        }, 'google_translate_element');
      };

      window.flashfeedTranslateTo = function(langCode) {
        var map = { zh: 'zh-CN', bn: 'bn' };
        var gl = langCode && langCode !== 'en' ? (map[langCode] || langCode) : '';

        /* Clear old cookie first */
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + window.location.hostname;

        if (!gl) {
          /* Back to English — reload without cookie so GT removes itself */
          window.location.reload();
          return;
        }

        /* Set cookie then fire the combo-box change so GT translates in-place */
        document.cookie = 'googtrans=/en/' + gl + '; path=/';
        document.cookie = 'googtrans=/en/' + gl + '; path=/; domain=' + window.location.hostname;

        var combo = document.querySelector('.goog-te-combo');
        if (combo) {
          combo.value = gl;
          combo.dispatchEvent(new Event('change'));
        } else {
          /* Widget not ready yet — reload so the cookie is picked up on init */
          window.location.reload();
        }
      };
    </script>
    <script type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async></script>
  </body>
</html>
